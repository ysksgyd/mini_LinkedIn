<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to Mini LinkedIn - Access your professional network.">
    <title>Sign In - Mini LinkedIn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="auth-container">
        <!-- Left Panel -->
        <div class="auth-left">
            <div class="floating-shapes">
                <div class="floating-shape"></div>
                <div class="floating-shape"></div>
                <div class="floating-shape"></div>
            </div>
            <div class="auth-left-content">
                <h2>Welcome Back!</h2>
                <p>Continue growing your professional network<br>with AI-powered features.</p>
                <div style="margin-top: 40px; display: flex; gap: 20px; justify-content: center;">
                    <div style="text-align: center;">
                        <div style="font-size: 2rem; font-weight: 800;">1K+</div>
                        <div style="font-size: 0.8rem; opacity: 0.8;">Professionals</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 2rem; font-weight: 800;">500+</div>
                        <div style="font-size: 0.8rem; opacity: 0.8;">AI Enhancements</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 2rem; font-weight: 800;">2K+</div>
                        <div style="font-size: 0.8rem; opacity: 0.8;">Connections</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Panel - Login Form -->
        <div class="auth-right">
            <div class="auth-form-container animate-fade-in-up">
                <a href="/index.html" class="nav-logo" style="display: inline-block; margin-bottom: 24px;">Mini LinkedIn</a>
                <h2>Sign In</h2>
                <p class="subtitle">New to Mini LinkedIn? <a href="/signup.html" class="auth-link">Create an account</a></p>

                <form id="login-form">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="input-field" placeholder="john@example.com" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div style="position: relative;">
                            <input type="password" id="password" class="input-field" placeholder="Enter your password" required style="padding-right: 48px;">
                            <button type="button"
                                style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted);"
                                onclick="togglePasswordVisibility()">
                                <i class="fas fa-eye" id="password-icon"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 8px;" id="login-btn">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>

                <div style="margin-top: 24px; text-align: center;">
                    <button onclick="resetPassword()" class="auth-link" style="background: none; border: none; cursor: pointer; font-family: inherit; font-size: 0.9rem;">
                        Forgot your password?
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/firebase-config.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        // Toggle password visibility
        function togglePasswordVisibility() {
            const input = document.getElementById('password');
            const icon = document.getElementById('password-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Handle login form submission
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            const submitBtn = document.getElementById('login-btn');
            setButtonLoading(submitBtn, 'Signing In...');

            try {
                // Sign in with Firebase
                await firebase.auth().signInWithEmailAndPassword(email, password);

                showToast('Welcome back!', 'success');

                // Redirect to feed
                setTimeout(() => {
                    window.location.href = '/feed.html';
                }, 500);
            } catch (error) {
                console.error('Login error:', error);

                let message = error.message;
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    message = 'Invalid email or password.';
                } else if (error.code === 'auth/too-many-requests') {
                    message = 'Too many failed attempts. Please try again later.';
                }

                showToast(message, 'error');
                resetButton(submitBtn);
            }
        });

        // Password reset
        async function resetPassword() {
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showToast('Please enter your email first', 'warning');
                return;
            }
            try {
                await firebase.auth().sendPasswordResetEmail(email);
                showToast('Password reset email sent! Check your inbox.', 'success');
            } catch (error) {
                showToast('Error sending reset email. Check your email address.', 'error');
            }
        }
    </script>
</body>
</html>
