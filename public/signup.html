<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign up for Mini LinkedIn - Create your professional profile and start networking.">
    <title>Sign Up - Mini LinkedIn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="auth-container">
        <!-- Left Panel - Decorative -->
        <div class="auth-left">
            <div class="floating-shapes">
                <div class="floating-shape"></div>
                <div class="floating-shape"></div>
                <div class="floating-shape"></div>
            </div>
            <div class="auth-left-content">
                <h2>Start Your Journey</h2>
                <p>Join a network of professionals powered by AI.<br>Your dream career begins here.</p>
                <div style="margin-top: 40px;">
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px; text-align: left;">
                        <div style="width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-magic"></i>
                        </div>
                        <span>AI-enhanced professional profiles</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px; text-align: left;">
                        <div style="width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-users"></i>
                        </div>
                        <span>Smart skill-based networking</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 12px; text-align: left;">
                        <div style="width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-rocket"></i>
                        </div>
                        <span>Share & grow together</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Panel - Sign Up Form -->
        <div class="auth-right">
            <div class="auth-form-container animate-fade-in-up">
                <a href="/index.html" class="nav-logo" style="display: inline-block; margin-bottom: 24px;">Mini LinkedIn</a>
                <h2>Create Account</h2>
                <p class="subtitle">Already have an account? <a href="/login.html" class="auth-link">Sign In</a></p>

                <form id="signup-form">
                    <div class="input-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" class="input-field" placeholder="John Doe" required minlength="2" maxlength="100">
                    </div>

                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="input-field" placeholder="john@example.com" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div style="position: relative;">
                            <input type="password" id="password" class="input-field" placeholder="Min 6 characters" required minlength="6" style="padding-right: 48px;">
                            <button type="button" id="toggle-password" 
                                style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted);"
                                onclick="togglePasswordVisibility('password', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="input-field" placeholder="Re-enter password" required minlength="6">
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 8px;" id="signup-btn">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/firebase-config.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        // Toggle password visibility
        function togglePasswordVisibility(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Handle signup form submission
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validation
            if (password !== confirmPassword) {
                showToast('Passwords do not match!', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }

            const submitBtn = document.getElementById('signup-btn');
            setButtonLoading(submitBtn, 'Creating Account...');

            try {
                // 1. Create user in Firebase
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);

                // 2. Update display name in Firebase
                await userCredential.user.updateProfile({ displayName: fullName });

                // 3. Create profile in our MongoDB database
                await apiRequest('/api/users/profile', {
                    method: 'POST',
                    body: JSON.stringify({ fullName, email }),
                });

                showToast('Account created successfully! Welcome to Mini LinkedIn!', 'success');

                // Redirect to edit profile page to complete setup
                setTimeout(() => {
                    window.location.href = '/edit-profile.html';
                }, 1000);
            } catch (error) {
                console.error('Signup error:', error);

                // Handle specific Firebase errors
                let message = error.message;
                if (error.code === 'auth/email-already-in-use') {
                    message = 'An account with this email already exists.';
                } else if (error.code === 'auth/weak-password') {
                    message = 'Password is too weak. Use at least 6 characters.';
                } else if (error.code === 'auth/invalid-email') {
                    message = 'Please enter a valid email address.';
                }

                showToast(message, 'error');
                resetButton(submitBtn);
            }
        });
    </script>
</body>
</html>
