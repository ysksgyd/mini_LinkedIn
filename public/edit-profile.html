<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Edit your professional profile on Mini LinkedIn.">
    <title>Edit Profile - Mini LinkedIn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
    <!-- Page Loader -->
    <div class="page-loader" id="page-loader">
        <div class="loader-content">
            <div class="loader-logo">Mini LinkedIn</div>
            <div class="spinner spinner-dark spinner-lg"></div>
        </div>
    </div>

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Edit Profile Content -->
    <div style="max-width: 700px; margin: 24px auto; padding: 0 16px;">
        <div class="card" style="padding: 32px;">
            <h2 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 24px; display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-pencil-alt" style="color: var(--primary);"></i> Edit Profile
            </h2>

            <form id="edit-profile-form">
                <!-- Profile Picture -->
                <div class="input-group" style="text-align: center; margin-bottom: 24px;">
                    <div id="current-avatar" style="margin-bottom: 12px;"></div>
                    <label for="profile-picture" class="btn btn-secondary btn-sm" style="cursor: pointer;">
                        <i class="fas fa-camera"></i> Change Photo
                    </label>
                    <input type="file" id="profile-picture" accept="image/*" style="display: none;">
                    <div id="profile-picture-preview" style="margin-top: 10px;"></div>
                </div>

                <!-- Full Name -->
                <div class="input-group">
                    <label for="fullName">Full Name *</label>
                    <input type="text" id="fullName" class="input-field" placeholder="John Doe" required>
                </div>

                <!-- Headline -->
                <div class="input-group">
                    <label for="headline">Professional Headline</label>
                    <input type="text" id="headline" class="input-field" placeholder="e.g., Full Stack Developer at Google" maxlength="200">
                </div>

                <!-- Bio/About -->
                <div class="input-group">
                    <label for="bio">About / Bio</label>
                    <textarea id="bio" class="input-field" rows="4" placeholder="Tell the world about yourself..." maxlength="2000"></textarea>
                    <div style="display: flex; justify-content: flex-end; margin-top: 6px;">
                        <button type="button" class="btn btn-ai btn-sm" onclick="enhanceBio()" id="enhance-bio-btn">
                            <i class="fas fa-magic"></i> AI Enhance Bio
                        </button>
                    </div>
                </div>

                <!-- Location -->
                <div class="input-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" class="input-field" placeholder="e.g., San Francisco, USA">
                </div>

                <!-- Skills -->
                <div class="input-group">
                    <label>Skills</label>
                    <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                        <input type="text" id="skill-input" class="input-field" placeholder="Type a skill and press Enter" style="margin-bottom: 0;"
                            onkeypress="if(event.key === 'Enter') { event.preventDefault(); addSkill(); }">
                        <button type="button" class="btn btn-primary btn-sm" onclick="addSkill()" id="add-skill-btn">Add</button>
                    </div>
                    <div id="skills-container" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
                </div>

                <!-- Experience Section -->
                <div class="input-group" style="border-top: 1px solid var(--border); padding-top: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <label style="margin-bottom: 0;">Work Experience</label>
                        <button type="button" class="btn btn-ghost btn-sm" onclick="addExperienceField()" id="add-experience-btn">
                            <i class="fas fa-plus"></i> Add
                        </button>
                    </div>
                    <div id="experience-container"></div>
                </div>

                <!-- Education Section -->
                <div class="input-group" style="border-top: 1px solid var(--border); padding-top: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <label style="margin-bottom: 0;">Education</label>
                        <button type="button" class="btn btn-ghost btn-sm" onclick="addEducationField()" id="add-education-btn">
                            <i class="fas fa-plus"></i> Add
                        </button>
                    </div>
                    <div id="education-container"></div>
                </div>

                <!-- Submit -->
                <div style="display: flex; gap: 12px; margin-top: 24px;">
                    <button type="submit" class="btn btn-primary btn-lg" style="flex: 1;" id="save-profile-btn">
                        <i class="fas fa-save"></i> Save Profile
                    </button>
                    <a href="/profile.html" class="btn btn-secondary btn-lg">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/firebase-config.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        let skills = [];
        let experienceCount = 0;
        let educationCount = 0;

        // ===========================================
        // Page Initialization
        // ===========================================
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await requireAuth();
                await renderNavbar('profile');

                // Load existing profile data
                await loadProfileData();

                // Setup image preview
                setupImagePreview('profile-picture', 'profile-picture-preview');

                document.getElementById('page-loader').classList.add('hidden');
            } catch (error) {
                console.error('Edit profile init error:', error);
                document.getElementById('page-loader').classList.add('hidden');
            }
        });

        // ===========================================
        // Load Existing Profile Data
        // ===========================================
        async function loadProfileData() {
            try {
                const response = await apiRequest('/api/users/me');

                if (response.success && response.data) {
                    const user = response.data;

                    // Fill form fields
                    document.getElementById('fullName').value = user.fullName || '';
                    document.getElementById('headline').value = user.headline || '';
                    document.getElementById('bio').value = user.bio || '';
                    document.getElementById('location').value = user.location || '';

                    // Show current avatar
                    document.getElementById('current-avatar').innerHTML =
                        avatarHTML(user.profilePicture, user.fullName, 'avatar-xl');

                    // Load skills
                    if (user.skills && user.skills.length > 0) {
                        skills = [...user.skills];
                        renderSkills();
                    }

                    // Load experience
                    if (user.experience && user.experience.length > 0) {
                        user.experience.forEach((exp) => addExperienceField(exp));
                    }

                    // Load education
                    if (user.education && user.education.length > 0) {
                        user.education.forEach((edu) => addEducationField(edu));
                    }
                }
            } catch (error) {
                // New user, no profile yet - that's okay
                const firebaseUser = firebase.auth().currentUser;
                if (firebaseUser) {
                    document.getElementById('fullName').value = firebaseUser.displayName || '';
                    document.getElementById('current-avatar').innerHTML =
                        avatarPlaceholderHTML(firebaseUser.displayName || 'User', 'avatar-xl');
                }
            }
        }

        // ===========================================
        // Skills Management
        // ===========================================
        function addSkill() {
            const input = document.getElementById('skill-input');
            const skill = input.value.trim();

            if (!skill) return;

            if (skills.includes(skill)) {
                showToast('Skill already added', 'warning');
                return;
            }

            if (skills.length >= 20) {
                showToast('Maximum 20 skills allowed', 'warning');
                return;
            }

            skills.push(skill);
            renderSkills();
            input.value = '';
            input.focus();
        }

        function removeSkill(index) {
            skills.splice(index, 1);
            renderSkills();
        }

        function renderSkills() {
            const container = document.getElementById('skills-container');
            container.innerHTML = skills.map((skill, index) => `
                <span class="skill-tag">
                    ${escapeHtml(skill)}
                    <span class="remove-skill" onclick="removeSkill(${index})">×</span>
                </span>
            `).join('');
        }

        // ===========================================
        // Experience Fields
        // ===========================================
        function addExperienceField(data = {}) {
            experienceCount++;
            const container = document.getElementById('experience-container');
            const id = experienceCount;

            const div = document.createElement('div');
            div.id = `exp-${id}`;
            div.style.cssText = 'background: var(--bg-primary); padding: 16px; border-radius: var(--radius-md); margin-bottom: 12px; position: relative;';
            div.innerHTML = `
                <button type="button" onclick="document.getElementById('exp-${id}').remove()"
                    style="position: absolute; top: 8px; right: 8px; background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 1.2rem;">
                    <i class="fas fa-times"></i>
                </button>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <input type="text" class="input-field exp-title" placeholder="Job Title" value="${escapeHtml(data.title || '')}">
                    <input type="text" class="input-field exp-company" placeholder="Company" value="${escapeHtml(data.company || '')}">
                    <input type="text" class="input-field exp-location" placeholder="Location" value="${escapeHtml(data.location || '')}">
                    <input type="text" class="input-field exp-start" placeholder="Start Date (e.g., Jan 2023)" value="${escapeHtml(data.startDate || '')}">
                    <input type="text" class="input-field exp-end" placeholder="End Date (or leave empty if current)" value="${escapeHtml(data.endDate || '')}">
                    <label style="display: flex; align-items: center; gap: 6px; font-size: 0.85rem;">
                        <input type="checkbox" class="exp-current" ${data.current ? 'checked' : ''}> Currently working here
                    </label>
                </div>
                <textarea class="input-field exp-description" placeholder="Description (optional)" rows="2" style="margin-top: 8px;">${escapeHtml(data.description || '')}</textarea>
            `;

            container.appendChild(div);
        }

        // ===========================================
        // Education Fields
        // ===========================================
        function addEducationField(data = {}) {
            educationCount++;
            const container = document.getElementById('education-container');
            const id = educationCount;

            const div = document.createElement('div');
            div.id = `edu-${id}`;
            div.style.cssText = 'background: var(--bg-primary); padding: 16px; border-radius: var(--radius-md); margin-bottom: 12px; position: relative;';
            div.innerHTML = `
                <button type="button" onclick="document.getElementById('edu-${id}').remove()"
                    style="position: absolute; top: 8px; right: 8px; background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 1.2rem;">
                    <i class="fas fa-times"></i>
                </button>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <input type="text" class="input-field edu-school" placeholder="School / University" value="${escapeHtml(data.school || '')}">
                    <input type="text" class="input-field edu-degree" placeholder="Degree" value="${escapeHtml(data.degree || '')}">
                    <input type="text" class="input-field edu-field" placeholder="Field of Study" value="${escapeHtml(data.field || '')}">
                    <div style="display: flex; gap: 8px;">
                        <input type="number" class="input-field edu-start" placeholder="Start Year" value="${data.startYear || ''}" min="1950" max="2030">
                        <input type="number" class="input-field edu-end" placeholder="End Year" value="${data.endYear || ''}" min="1950" max="2030">
                    </div>
                </div>
            `;

            container.appendChild(div);
        }

        // ===========================================
        // AI Bio Enhancement
        // ===========================================
        async function enhanceBio() {
            const bioInput = document.getElementById('bio');
            const bio = bioInput.value.trim();

            if (!bio) {
                showToast('Write a bio first, then enhance it!', 'warning');
                return;
            }

            const enhanceBtn = document.getElementById('enhance-bio-btn');
            setButtonLoading(enhanceBtn, 'Enhancing...');

            try {
                const response = await apiRequest('/api/ai/enhance-bio', {
                    method: 'POST',
                    body: JSON.stringify({ bio }),
                });

                if (response.success && response.data.enhanced) {
                    bioInput.value = response.data.enhanced;
                    showToast('Bio enhanced with AI! ✨', 'success');
                }
            } catch (error) {
                showToast('AI enhancement failed. Try again.', 'error');
            }

            resetButton(enhanceBtn);
        }

        // ===========================================
        // Form Submission
        // ===========================================
        document.getElementById('edit-profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('save-profile-btn');
            setButtonLoading(submitBtn, 'Saving...');

            try {
                // Collect experience data
                const experience = [];
                document.querySelectorAll('[id^="exp-"]').forEach((el) => {
                    const title = el.querySelector('.exp-title')?.value.trim();
                    const company = el.querySelector('.exp-company')?.value.trim();
                    if (title || company) {
                        experience.push({
                            title: title || '',
                            company: company || '',
                            location: el.querySelector('.exp-location')?.value.trim() || '',
                            startDate: el.querySelector('.exp-start')?.value.trim() || '',
                            endDate: el.querySelector('.exp-end')?.value.trim() || '',
                            current: el.querySelector('.exp-current')?.checked || false,
                            description: el.querySelector('.exp-description')?.value.trim() || '',
                        });
                    }
                });

                // Collect education data
                const education = [];
                document.querySelectorAll('[id^="edu-"]').forEach((el) => {
                    const school = el.querySelector('.edu-school')?.value.trim();
                    if (school) {
                        education.push({
                            school: school,
                            degree: el.querySelector('.edu-degree')?.value.trim() || '',
                            field: el.querySelector('.edu-field')?.value.trim() || '',
                            startYear: parseInt(el.querySelector('.edu-start')?.value) || null,
                            endYear: parseInt(el.querySelector('.edu-end')?.value) || null,
                        });
                    }
                });

                // Build FormData for profile update (supports file upload)
                const formData = new FormData();
                formData.append('fullName', document.getElementById('fullName').value.trim());
                formData.append('headline', document.getElementById('headline').value.trim());
                formData.append('bio', document.getElementById('bio').value.trim());
                formData.append('location', document.getElementById('location').value.trim());
                formData.append('skills', JSON.stringify(skills));
                formData.append('experience', JSON.stringify(experience));
                formData.append('education', JSON.stringify(education));

                // Add profile picture if selected
                const profilePicture = document.getElementById('profile-picture').files[0];
                if (profilePicture) {
                    formData.append('profilePicture', profilePicture);
                }

                const response = await apiRequest('/api/users/profile', {
                    method: 'PUT',
                    body: formData,
                });

                if (response.success) {
                    showToast('Profile updated successfully! 🎉', 'success');
                    setTimeout(() => {
                        window.location.href = '/profile.html';
                    }, 1000);
                }
            } catch (error) {
                console.error('Save profile error:', error);
                showToast(error.message || 'Error saving profile', 'error');
            }

            resetButton(submitBtn);
        });
    </script>
</body>
</html>
